<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Точка на карте</title>
  {% load static %}
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap">
</head>
<body class="bg-rice text-moss font-sans font-light antialiased
             min-h-screen flex flex-col items-center justify-center
             px-6 text-center">

  <div class="max-w-[560px] mx-auto">

    <div class="font-serif text-[clamp(52px,12vw,88px)] leading-none select-none mb-2"
         aria-hidden="true">
      ヽ(°ο°)ノ
    </div>

    <div class="text-[11.5px] tracking-[0.32em] uppercase text-terracotta mt-8 mb-4">
      Ошибка 404
    </div>

    <h1 class="m-0 font-serif font-medium text-[clamp(28px,5vw,52px)] leading-[1.1]">
      Маршрут не найден
    </h1>

    <p class="mt-5 text-[clamp(14px,1.5vw,16px)] font-light text-muted
              leading-relaxed max-w-[42ch] mx-auto">
      Похоже, эта страница заблудилась где-то между рисовыми полями и вулканами.
      Возможно, адрес изменился или страница была удалена.
    </p>

    <div class="mt-9 flex flex-wrap gap-3 justify-center">
      <a href="/"
         class="px-8 py-[16px] bg-terracotta text-rice rounded-full text-[12.5px]
                tracking-[0.18em] uppercase no-underline hover:bg-terracotta-dark
                transition-colors duration-300">
        На главную
      </a>
      <a href="/catalog/"
         class="px-8 py-[16px] border border-bamboo-line text-moss rounded-full text-[12.5px]
                tracking-[0.18em] uppercase no-underline hover:border-terracotta
                hover:text-terracotta transition-colors duration-300">
        Смотреть туры
      </a>
    </div>

  </div>

  <footer class="absolute bottom-7 left-0 right-0 text-center
                 text-[11.5px] tracking-[0.12em] text-muted-2 opacity-60">
    Точка на карте — авторские туры по Азии
  </footer>

</body>
</html>

<section id="quote" class="py-[clamp(110px,18vh,200px)] px-[clamp(24px,8vw,96px)]
                border-t border-bamboo-line border-b border-bamboo-line">
  <div class="max-w-[980px] mx-auto text-center">
    <div class="font-serif text-[clamp(80px,12vw,150px)] leading-[0.5] text-terracotta
                h-[0.4em] select-none">"</div>
    <blockquote class="m-0 font-serif font-medium italic
                       text-[clamp(26px,4.2vw,52px)] leading-[1.32] text-moss text-balance">
      {{ value.quote }}
    </blockquote>
    <div class="mt-10 flex flex-col items-center gap-1.5">
      <div class="w-9 h-px bg-terracotta mb-3.5"></div>
      <cite class="not-italic text-[13px] tracking-[0.2em] uppercase text-muted">
        {{ value.author }}
      </cite>
    </div>
  </div>
</section>

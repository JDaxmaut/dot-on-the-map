<div style="background:#242d24;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
  <span style="color:rgba(221,216,204,0.55);font-size:12px;text-transform:uppercase;letter-spacing:0.14em;flex:1;min-width:140px;">Быстрые действия</span>
  {% if catalog_id %}
  <a href="/admin/pages/add/tours/tourpage/{{ catalog_id }}/"
     style="display:inline-flex;align-items:center;gap:8px;background:#C86B49;color:#F4F1EA;text-decoration:none;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:500;transition:background 0.15s;">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M7 1v12M1 7h12"/>
    </svg>
    Добавить тур
  </a>
  {% endif %}
  <a href="/catalog/" target="_blank"
     style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.07);color:#ddd8cc;text-decoration:none;padding:9px 20px;border-radius:8px;font-size:13px;border:1px solid rgba(255,255,255,0.1);">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 2H2a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V8M8 1h4m0 0v4m0-4L5.5 7.5"/>
    </svg>
    Открыть сайт
  </a>
</div>
